<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online File Converter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div style="font-size: 0.8em; color: #aaa; margin-bottom: 10px;">About Me: Developer & Creator</div>
    <h1>Online File Converter</h1>
  </header>
  
  <main>
    <div class="converter-box">
      <div class="input-row">
        <label for="fileInput" class="custom-file-label">Choose File</label>
        <input type="file" id="fileInput">
        <span id="fileName">No file chosen</span>
        <select id="formatSelect" class="format-select">
          <option value="pdf">PDF</option><option value="docx">DOCX</option>
          <option value="jpg">JPG</option><option value="png">PNG</option>
          <option value="mp3">MP3</option><option value="webp">WEBP</option>
        </select>
        <button id="convertBtn" class="convert-btn">Convert</button>
      </div>
      <div id="result"></div>
    </div>
  </main>

  <footer>
    <div style="font-size: 0.8em; color: #888; margin-top: 20px;">
      About Me: Proudly built to simplify your digital tasks.
    </div>
  </footer>
  <script src="script.js"></script>
</body>
</html>
