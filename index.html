<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free online file converter. Convert PDF to DOCX, MP4 to MP3, JPG to PNG, and more. Fast, secure, and free online tool.">
  <title>Online File Converter | Fast, Free & Secure</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Online File Converter</h1>
  </header>
  <main>
    <div class="converter-box">
      <div class="input-row">
        <label for="fileInput" class="custom-file-label">Choose File</label>
        <input type="file" id="fileInput">
        <span id="fileName">No file chosen</span>
        <select id="formatSelect" class="format-select">
          <option value="pdf">PDF</option>
          <option value="docx">DOCX</option>
          <option value="jpg">JPG</option>
          <option value="png">PNG</option>
          <option value="mp3">MP3 (Audio)</option>
          <option value="webp">WEBP</option>
          <option value="txt">TXT</option>
          <option value="epub">EPUB</option>
        </select>
        <button id="convertBtn" class="convert-btn">Convert</button>
      </div>
      <div id="result"></div>
    </div>

    <section style="margin-top: 50px; text-align: center; color: #555;">
      <h2>Supported Popular Conversions</h2>
      <p>Convert your files to: PDF, DOCX, JPG, PNG, MP3, WEBP, TXT, EPUB</p>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
