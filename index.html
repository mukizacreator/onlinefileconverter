<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online File Converter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Online File Converter</h1>
    <p>Convert your files easily and securely — built by Emmanuel MUKIZA</p>
  </header>

  <main>
    <div class="converter-box">
      <input type="file" id="fileInput">
      <select id="formatSelect">
        <option value="jpg">Convert to JPG</option>
        <option value="pdf">Convert to PDF</option>
        <option value="png">Convert to PNG</option>
      </select>
      <button id="convertBtn">Convert File</button>
      <div id="result"></div>
    </div>
  </main>

  <footer>
    <p>© 2026 Emmanuel MUKIZA | Hosted on GitHub Pages</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
