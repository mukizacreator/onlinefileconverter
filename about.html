  <script>
  // ============================================
  // NAVIGATION AUTH SCRIPT - FIXED
  // ============================================
  (function() {
    try {
      const loggedInEmail = localStorage.getItem("loggedInUser");
      const users = JSON.parse(localStorage.getItem("users")) || [];
      const user = users.find((u) => u.email === loggedInEmail);
      
      const guestNav = document.getElementById("guestNav");
      const profileNav = document.getElementById("profileNav");
      const navUsername = document.getElementById("navUsername");
      const navProfilePhoto = document.getElementById("navProfilePhoto");
      
      const DEFAULT_ICON = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

      if (user) {
        if (guestNav) guestNav.style.display = "none";
        if (profileNav) {
          profileNav.style.display = "flex";
          profileNav.style.alignItems = "center";
        }
        if (navUsername) navUsername.textContent = user.username || 'Profile';
        if (navProfilePhoto) navProfilePhoto.src = user.photo || DEFAULT_ICON;
      } else {
        if (guestNav) {
          guestNav.style.display = "flex";
          guestNav.style.alignItems = "center";
          guestNav.style.gap = "8px";
        }
        if (profileNav) {
          profileNav.style.display = "none !important";
          profileNav.style.visibility = "hidden";
          profileNav.style.opacity = "0";
        }
      }
    } catch (error) {
      console.error("Navigation error:", error);
      const guestNav = document.getElementById("guestNav");
      if (guestNav) {
        guestNav.style.display = "flex";
        guestNav.style.alignItems = "center";
        guestNav.style.gap = "8px";
      }
      const profileNav = document.getElementById("profileNav");
      if (profileNav) profileNav.style.display = "none";
    }
  })();
</script>
