<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="referrer" content="no-referrer-when-downgrade">
  <meta name="description" content="Sign in to your Universal Online File Converter account.">
  <meta name="keywords" content="sign in, login, online file converter account">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="Sign In | Online File Converter">
  <meta property="og:description" content="Access your Online File Converter account.">
  <meta property="og:image" content="favicon.png">
  <title>Sign In | Online File Converter</title>
  
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="shortcut icon" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
</head>

<body>

  <nav class="top-nav">
  <div class="nav-left">
    <button class="hamburger" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
    <a href="index.html" class="nav-link active"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
    <a href="projects.html" class="nav-link desktop-only"><i class="fa-solid fa-diagram-project"></i> Other Projects</a>
    <a href="about.html" class="nav-link desktop-only"><i class="fa-solid fa-circle-info"></i> About & Support</a>
  </div>
  <div class="nav-right" id="navRight">
    <div id="guestNav">
      <a href="signin.html" class="nav-link">Sign In</a>
      <a href="signup.html" class="nav-link">Sign Up</a>
    </div>
  </div>
</nav>

<!-- Mobile Dropdown -->
<div id="mobileMenu" class="mobile-menu">
  <a href="projects.html" class="nav-link">Other Projects</a>
  <a href="about.html" class="nav-link">About & Support</a>
</div>

<script>
  function toggleMenu() {
    document.getElementById("mobileMenu").classList.toggle("active");
  }
</script>

  <header>
    <h1>Sign In</h1>
    <p class="subtitle">Access your account securely.</p>
  </header>

  <main class="dashboard">
    <div class="converter-box" style="max-width:520px;">
      <form id="signinForm" autocomplete="off" method="post" action="#">
        <div style="margin-bottom:18px;">
          <label for="signinEmail">Email</label>
          <input type="email" id="signinEmail" name="email" placeholder="Enter your email" required autocomplete="email">
        </div>

        <div style="margin-bottom:22px;">
          <label for="signinPassword" style="display:block; margin-bottom:4px; font-weight:600; font-size:0.9rem;">Password</label>
          <div style="display:flex; gap:8px; align-items:center; width:100%;">
            <input type="password" id="signinPassword" name="password" placeholder="Enter your password" required style="flex:1; min-width:0; padding:10px 14px; border:none; outline:none; border-radius:10px; background:rgba(255,255,255,0.12); color:white; font-size:0.95rem; width:100%; box-sizing:border-box;" autocomplete="current-password" aria-label="Password">
            <button type="button" id="toggleSignin" class="convert-btn" style="padding:10px 14px; white-space:nowrap; flex-shrink:0; flex-grow:0; width:auto; min-width:44px; max-width:50px; font-size:0.85rem; display:flex; align-items:center; justify-content:center; border:none; border-radius:10px; background:#00bcd4; color:white; cursor:pointer; transition:0.3s;">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>

        <div style="text-align:left; margin-bottom:40px; margin-top:25px;">
          <a href="#" id="forgotPasswordLink" style="color:#00bcd4; font-size:1rem; text-decoration:none; transition:0.3s;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">
            Forgot password?
          </a>
        </div>

        <button type="submit" class="convert-btn" style="width:100%; padding:14px; font-size:1rem;">Sign In</button>
        <div id="signinMessage" style="margin-top:18px; text-align:center;"></div>
      </form>
    </div>
  </main>

  <script src="auth.js?v=5"></script>
  <script src="notifications.js?v=4"></script>
  <script src="modal.js?v=4"></script>

  <footer>
    <div class="copyright">© 2026 Emmanuel MUKIZA</div>
  </footer>

  <script>
  document.addEventListener('DOMContentLoaded', function() {
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const mobileDropdown = document.getElementById('mobileDropdown');
    
    if (hamburgerBtn && mobileDropdown) {
      hamburgerBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        mobileDropdown.classList.toggle('open');
        
        const icon = this.querySelector('i');
        if (mobileDropdown.classList.contains('open')) {
          icon.className = 'fa-solid fa-times';
        } else {
          icon.className = 'fa-solid fa-bars';
        }
      });
      
      document.addEventListener('click', function(e) {
        if (!hamburgerBtn.contains(e.target) && !mobileDropdown.contains(e.target)) {
          mobileDropdown.classList.remove('open');
          const icon = hamburgerBtn.querySelector('i');
          if (icon) {
            icon.className = 'fa-solid fa-bars';
          }
        }
      });
      
      const mobileLinks = mobileDropdown.querySelectorAll('.mobile-nav-link');
      mobileLinks.forEach(link => {
        link.addEventListener('click', function() {
          mobileDropdown.classList.remove('open');
          const icon = hamburgerBtn.querySelector('i');
          if (icon) {
            icon.className = 'fa-solid fa-bars';
          }
        });
      });
    }
  });
  </script>

</body>
</html>
