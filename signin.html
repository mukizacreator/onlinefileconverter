<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer-when-downgrade">
  <meta name="description" content="Sign in to your Universal Online File Converter account.">
  <meta name="keywords" content="sign in, login, online file converter account">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="Sign In | Online File Converter">
  <meta property="og:description" content="Access your Online File Converter account.">
  <meta property="og:image" content="favicon.png">
  <title>Sign In | Online File Converter</title>
  
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="shortcut icon" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
</head>

<body>

  <nav class="top-nav">
    <div class="nav-left">
      <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle navigation">
        <i class="fa-solid fa-bars"></i>
      </button>
      <a href="index.html" class="nav-link"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
      <a href="projects.html" class="nav-link desktop-link"><i class="fa-solid fa-diagram-project"></i> Other Projects</a>
      <a href="about.html" class="nav-link desktop-link"><i class="fa-solid fa-circle-info"></i> About & Support</a>
    </div>
    <div class="nav-right">
      <a href="signin.html" class="nav-link active"><i class="fa-solid fa-right-to-bracket"></i> Sign In</a>
      <a href="signup.html" class="nav-link"><i class="fa-solid fa-user-plus"></i> Sign Up</a>
    </div>
  </nav>

  <div class="mobile-dropdown" id="mobileDropdown">
    <a href="projects.html" class="mobile-nav-link"><i class="fa-solid fa-diagram-project"></i> Other Projects</a>
    <a href="about.html" class="mobile-nav-link"><i class="fa-solid fa-circle-info"></i> About & Support</a>
  </div>

  <header>
    <h1>Sign In</h1>
    <p class="subtitle">Access your account securely.</p>
  </header>

  <main class="dashboard">
    <div class="converter-box" style="max-width:520px;">
      <form id="signinForm" autocomplete="off" method="post" action="#">
        <div style="margin-bottom:18px;">
          <label for="signinEmail">Email</label>
          <input type="email" id="signinEmail" name="email" placeholder="Enter your email" required autocomplete="email">
        </div>

        <div style="margin-bottom:22px;">
          <label for="signinPassword">Password</label>
          <div style="display:flex; gap:10px; margin-top:8px;">
            <input type="password" id="signinPassword" name="password" placeholder="Enter your password" required style="flex:1;" autocomplete="current-password" aria-label="Password">
            <button type="button" id="toggleSignin" class="convert-btn" style="padding:14px 18px; white-space:nowrap;">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>

        <div style="text-align:left; margin-bottom:40px; margin-top:25px;">
          <a href="#" id="forgotPasswordLink" style="color:#00bcd4; font-size:1rem; text-decoration:none; transition:0.3s;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">
            Forgot password?
          </a>
        </div>

        <button type="submit" class="convert-btn" style="width:100%; padding:14px; font-size:1rem;">Sign In</button>
        <div id="signinMessage" style="margin-top:18px; text-align:center;"></div>
      </form>
    </div>
  </main>

  <script src="auth.js?v=5"></script>
  <script src="notifications.js?v=4"></script>
  <script src="modal.js?v=4"></script>

  <script>
  document.addEventListener('DOMContentLoaded', function() {
    var hamburgerBtn = document.getElementById('hamburgerBtn');
    var mobileDropdown = document.getElementById('mobileDropdown');
    
    if (hamburgerBtn && mobileDropdown) {
      hamburgerBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        mobileDropdown.classList.toggle('open');
        
        var icon = this.querySelector('i');
        if (mobileDropdown.classList.contains('open')) {
          icon.className = 'fa-solid fa-times';
        } else {
          icon.className = 'fa-solid fa-bars';
        }
      });
      
      document.addEventListener('click', function(e) {
        if (!hamburgerBtn.contains(e.target) && !mobileDropdown.contains(e.target)) {
          mobileDropdown.classList.remove('open');
          var icon = hamburgerBtn.querySelector('i');
          if (icon) {
            icon.className = 'fa-solid fa-bars';
          }
        }
      });
      
      var mobileLinks = mobileDropdown.querySelectorAll('.mobile-nav-link');
      for (var i = 0; i < mobileLinks.length; i++) {
        mobileLinks[i].addEventListener('click', function() {
          mobileDropdown.classList.remove('open');
          var icon = hamburgerBtn.querySelector('i');
          if (icon) {
            icon.className = 'fa-solid fa-bars';
          }
        });
      }
    }
  });
  </script>

  <footer>
    <div class="copyright">© 2026 Emmanuel MUKIZA</div>
  </footer>

</body>
</html>
