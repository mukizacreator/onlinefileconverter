<!DOCTYPE html>
<html lang="en">

<head>
  <!-- ============================================
       METADATA & SEO CONFIGURATION
       ============================================ -->
  <!-- Basic character encoding and responsive viewport settings -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO meta tags for search engine optimization -->
  <meta name="description" content="Create an account for the Universal Online File Converter.">
  <meta name="keywords" content="sign up, register, create account, online file converter account">
  <meta name="robots" content="index, follow">
  
  <!-- Open Graph tags for social media sharing previews -->
  <meta property="og:title" content="Sign Up | Online File Converter">
  <meta property="og:description" content="Create your account and start using the Universal Online File Converter.">
  <meta property="og:image" content="favicon.png">
  
  <!-- Page title displayed in browser tab -->
  <title>Sign Up | Online File Converter</title>
  
  <!-- ============================================
       FAVICON & ICON LINKS
       ============================================ -->
  <!-- Multiple icon formats for cross-browser and device compatibility -->
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="shortcut icon" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  
  <!-- ============================================
       STYLESHEETS
       ============================================ -->
  <!-- Custom site stylesheet -->
  <link rel="stylesheet" href="style.css">
  <!-- Font Awesome 6 icon library for UI icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
</head>

<body>

  <!-- ============================================
       TOP NAVIGATION BAR
       ============================================ -->
  <!-- Left side: primary navigation links to main pages -->
  <!-- Right side: Sign Up is active (highlighted) -->
  <nav class="top-nav">
    <div class="nav-left">
      <a href="index.html" class="nav-link"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
      <a href="projects.html" class="nav-link"><i class="fa-solid fa-diagram-project"></i> Other Projects</a>
      <a href="about.html" class="nav-link"><i class="fa-solid fa-circle-info"></i> About & Support</a>
    </div>
    <div class="nav-right">
      <a href="signin.html" class="nav-link"><i class="fa-solid fa-right-to-bracket"></i> Sign In</a>
      <a href="signup.html" class="nav-link active"><i class="fa-solid fa-user-plus"></i> Sign Up</a>
    </div>
  </nav>

  <!-- ============================================
       PAGE HEADER
       ============================================ -->
  <!-- Main title and subtitle for the registration page -->
  <header>
    <h1>Create Account</h1>
    <p class="subtitle">Register securely to unlock larger file conversions.</p>
  </header>

  <!-- ============================================
       MAIN CONTENT - SIGN UP FORM
       ============================================ -->
  <!-- Registration form with username, email, password (with show/hide toggle), confirm password, and password requirements -->
  <main class="dashboard">
    <div class="converter-box" style="max-width:560px;">
      <form id="signupForm" method="post" action="#">
        
        <!-- USERNAME FIELD -->
        <div style="margin-bottom:18px;">
          <label for="signupUsername">Username</label>
          <input type="text" id="signupUsername" name="username" placeholder="Choose a username" minlength="3" required autocomplete="username">
        </div>

        <!-- EMAIL FIELD -->
        <div style="margin-bottom:18px;">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" name="email" placeholder="Enter your email" required autocomplete="email">
        </div>

        <!-- PASSWORD FIELD WITH SHOW/HIDE TOGGLE -->
        <div style="margin-bottom:18px;">
          <label for="signupPassword">Password</label>
          <div style="display:flex; gap:10px; margin-top:8px;">
            <input type="password" id="signupPassword" name="new-password" placeholder="Create password" required style="flex:1;" autocomplete="new-password" aria-label="New password">
              <!-- Show/Hide password toggle button -->  
              <button type="button" id="toggleSignup" class="convert-btn" style="padding:14px 18px; white-space:nowrap;">
                <i class="fa-solid fa-eye"></i>
              </button>
          </div>
        </div>

        <!-- CONFIRM PASSWORD FIELD -->
        <div style="margin-bottom:20px;">
          <label for="signupConfirmPassword">Confirm Password</label>
          <input type="password" id="signupConfirmPassword" name="confirm-password" placeholder="Re-enter password" required autocomplete="new-password" aria-label="Confirm password">
        </div>

        <!-- PASSWORD REQUIREMENTS DISPLAY -->
        <!-- Shows the user what password criteria must be met -->
        <div style="color:#bbb; font-size:0.85rem; line-height:1.7; margin-bottom:22px;">
          Password requirements:<br>
          • At least 5 characters<br>
          • At least one capital letter<br>
          • At least one number<br>
          • At least one symbol
        </div>

        <!-- SUBMIT BUTTON -->
        <button type="submit" class="convert-btn" style="width:100%; padding:14px; font-size:1rem;">Create Account</button>

        <!-- CONTAINER FOR SUCCESS/ERROR MESSAGES -->
        <div id="signupMessage" style="margin-top:18px; text-align:center;"></div>
      </form>
    </div>
  </main>

  <!-- ============================================
       FOOTER - COPYRIGHT NOTICE
       ============================================ -->
  <footer>
    <div class="copyright">© 2026 Emmanuel MUKIZA</div>
  </footer>

  <!-- ============================================
       JAVASCRIPT - AUTHENTICATION LOGIC
       ============================================ -->
  <!-- Handles form submission, password toggle, and account creation -->
  <script src="auth.js"></script>

  <script src="notifications.js"></script>

</body>
</html>
