<header>

  <h1>Create Account</h1>

  <p class="subtitle">
    Register securely to unlock larger file conversions.
  </p>

</header>

<main class="dashboard">

  <div
    class="converter-box"
    style="
      max-width:560px;
    "
  >

    <form id="signupForm">

      <div
        style="
          margin-bottom:18px;
        "
      >

        <label for="signupEmail">
          Email
        </label>

        <input
          type="email"
          id="signupEmail"
          placeholder="Enter your email"
          required
        >

      </div>

      <div
        style="
          margin-bottom:14px;
        "
      >

        <label for="signupPassword">
          Password
        </label>

        <div
          style="
            display:flex;
            gap:10px;
            margin-top:8px;
          "
        >

          <input
            type="password"
            id="signupPassword"
            placeholder="Create password"
            required
            style="
              flex:1;
            "
          >

          <button
            type="button"
            id="toggleSignup"
            class="convert-btn"
            style="
              padding:14px 18px;
              white-space:nowrap;
            "
          >
            <i class="fa-solid fa-eye"></i>
          </button>

        </div>

      </div>

      <div
        style="
          color:#bbb;
          font-size:0.85rem;
          line-height:1.7;
          margin-bottom:22px;
        "
      >
        Password requirements:
        <br>
        • At least 5 characters
        <br>
        • At least one capital letter
        <br>
        • At least one number
        <br>
        • At least one symbol
      </div>

      <button
        type="submit"
        class="convert-btn"
        style="
          width:100%;
          padding:14px;
          font-size:1rem;
        "
      >
        Create Account
      </button>

      <div
        id="signupMessage"
        style="
          margin-top:18px;
          text-align:center;
        "
      ></div>

    </form>

  </div>

</main>
